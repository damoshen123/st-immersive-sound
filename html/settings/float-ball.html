<div class="st-is-tab-content" id="st-is-tab-float-ball">
    <div class="st-is-settings-section">
        <h3>悬浮球设置</h3>
        <div class="st-is-field">
            <label for="enable_float_ball">启用悬浮球</label>
            <div class="st-is-toggle">
                <input id="enable_float_ball" type="checkbox" />
                <span class="st-is-slider"></span>
            </div>
        </div>
        <div class="st-is-field">
            <label for="float_ball_bg_color">悬浮球底色</label>
            <input type="color" id="float_ball_bg_color" value="#ADD8E6" class="st-is-color-picker">
        </div>
        <div class="st-is-field">
            <label for="float_ball_icon_color">耳机图标颜色</label>
            <input type="color" id="float_ball_icon_color" value="#FFFFFF" class="st-is-color-picker">
        </div>
        <div class="st-is-field">
            <label for="float_ball_opacity">悬浮球不透明度</label>
            <div class="st-is-range-container">
                <input class="st-is-range-slider" type="range" id="float_ball_opacity" min="0" max="1" step="0.1" value="1">
                <input class="st-is-range-input" type="number" id="float_ball_opacity_value" data-for="float_ball_opacity" min="0" max="1" step="0.1" value="1">
            </div>
        </div>
        <div class="st-is-field">
            <label for="float_ball_size">悬浮球大小</label>
            <div class="st-is-range-container">
                <input class="st-is-range-slider" type="range" id="float_ball_size" min="30" max="100" step="1" value="50">
                <input class="st-is-range-input" type="number" id="float_ball_size_value" data-for="float_ball_size" min="30" max="100" step="1" value="50">
            </div>
        </div>
    </div>
</div>
