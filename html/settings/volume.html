<div class="st-is-tab-content" id="st-is-tab-volume">
    <div class="st-is-settings-section">
        <h3>音量设置</h3>
        <div class="st-is-grid">
            <div class="st-is-field">
                <label for="masterVolume">整体音量</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="masterVolume" min="0" max="2" step="0.01" value="1">
                    <input class="st-is-range-input" type="number" id="masterVolume_value" data-for="masterVolume" min="0" max="2" step="0.01" value="1">
                </div>
            </div>
            <div class="st-is-field">
                <label for="musicVolume">Music 音量</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="musicVolume" min="0" max="2" step="0.01" value="1">
                    <input class="st-is-range-input" type="number" id="musicVolume_value" data-for="musicVolume" min="0" max="2" step="0.01" value="1">
                </div>
            </div>
            <div class="st-is-field">
                <label for="ambianceVolume">Ambiance 音量</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="ambianceVolume" min="0" max="2" step="0.01" value="1">
                    <input class="st-is-range-input" type="number" id="ambianceVolume_value" data-for="ambianceVolume" min="0" max="2" step="0.01" value="1">
                </div>
            </div>
            <div class="st-is-field">
                <label for="sfxVolume">SFX 音量</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="sfxVolume" min="0" max="2" step="0.01" value="1">
                    <input class="st-is-range-input" type="number" id="sfxVolume_value" data-for="sfxVolume" min="0" max="2" step="0.01" value="1">
                </div>
            </div>
            <div class="st-is-field">
                <label for="sfx_waitVolume">SFX_WAIT 音量</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="sfx_waitVolume" min="0" max="2" step="0.01" value="1">
                    <input class="st-is-range-input" type="number" id="sfx_waitVolume_value" data-for="sfx_waitVolume" min="0" max="2" step="0.01" value="1">
                </div>
            </div>
            <div class="st-is-field">
                <label for="voiceVolume">VOICE 音量</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="voiceVolume" min="0" max="2" step="0.01" value="1">
                    <input class="st-is-range-input" type="number" id="voiceVolume_value" data-for="voiceVolume" min="0" max="2" step="0.01" value="1">
                </div>
            </div>
        </div>
    </div>
    <div class="st-is-settings-section">
        <h3>淡入淡出设置 (秒)</h3>
        <div class="st-is-grid">
            <div class="st-is-field">
                <label for="musicFadeIn">Music 淡入</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="musicFadeIn" min="0" max="10" step="0.1" value="3">
                    <input class="st-is-range-input" type="number" id="musicFadeIn_value" data-for="musicFadeIn" min="0" max="10" step="0.1" value="3">
                </div>
            </div>
            <div class="st-is-field">
                <label for="musicFadeOut">Music 淡出</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="musicFadeOut" min="0" max="10" step="0.1" value="2">
                    <input class="st-is-range-input" type="number" id="musicFadeOut_value" data-for="musicFadeOut" min="0" max="10" step="0.1" value="2">
                </div>
            </div>
            <div class="st-is-field">
                <label for="ambianceFadeIn">Ambiance 淡入</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="ambianceFadeIn" min="0" max="10" step="0.1" value="3">
                    <input class="st-is-range-input" type="number" id="ambianceFadeIn_value" data-for="ambianceFadeIn" min="0" max="10" step="0.1" value="3">
                </div>
            </div>
            <div class="st-is-field">
                <label for="ambianceFadeOut">Ambiance 淡出</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="ambianceFadeOut" min="0" max="10" step="0.1" value="2">
                    <input class="st-is-range-input" type="number" id="ambianceFadeOut_value" data-for="ambianceFadeOut" min="0" max="10" step="0.1" value="2">
                </div>
            </div>
            <div class="st-is-field">
                <label for="sfxFadeIn">SFX 淡入</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="sfxFadeIn" min="0" max="5" step="0.1" value="0.1">
                    <input class="st-is-range-input" type="number" id="sfxFadeIn_value" data-for="sfxFadeIn" min="0" max="5" step="0.1" value="0.1">
                </div>
            </div>
            <div class="st-is-field">
                <label for="sfxFadeOut">SFX 淡出</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="sfxFadeOut" min="0" max="5" step="0.1" value="0.1">
                    <input class="st-is-range-input" type="number" id="sfxFadeOut_value" data-for="sfxFadeOut" min="0" max="5" step="0.1" value="0.1">
                </div>
            </div>
            <div class="st-is-field">
                <label for="sfx_waitFadeIn">SFX_WAIT 淡入</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="sfx_waitFadeIn" min="0" max="5" step="0.1" value="0.1">
                    <input class="st-is-range-input" type="number" id="sfx_waitFadeIn_value" data-for="sfx_waitFadeIn" min="0" max="5" step="0.1" value="0.1">
                </div>
            </div>
            <div class="st-is-field">
                <label for="sfx_waitFadeOut">SFX_WAIT 淡出</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="sfx_waitFadeOut" min="0" max="5" step="0.1" value="0.1">
                    <input class="st-is-range-input" type="number" id="sfx_waitFadeOut_value" data-for="sfx_waitFadeOut" min="0" max="5" step="0.1" value="0.1">
                </div>
            </div>
            <div class="st-is-field">
                <label for="voiceFadeIn">VOICE 淡入</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="voiceFadeIn" min="0" max="5" step="0.1" value="0.1">
                    <input class="st-is-range-input" type="number" id="voiceFadeIn_value" data-for="voiceFadeIn" min="0" max="5" step="0.1" value="0.1">
                </div>
            </div>
            <div class="st-is-field">
                <label for="voiceFadeOut">VOICE 淡出</label>
                <div class="st-is-range-container">
                    <input class="st-is-range-slider" type="range" id="voiceFadeOut" min="0" max="5" step="0.1" value="0.1">
                    <input class="st-is-range-input" type="number" id="voiceFadeOut_value" data-for="voiceFadeOut" min="0" max="5" step="0.1" value="0.1">
                </div>
            </div>
        </div>
    </div>
</div>
