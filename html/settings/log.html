<div class="st-is-tab-content" id="st-is-tab-log">
    <div class="st-is-settings-section">
        <h3>日志</h3>
        <div class="st-is-field">
            <label>操作</label>
            <div>
                <button id="st-is-export-log" class="st-is-btn">导出日志</button>
                <button id="st-is-clear-log" class="st-is-btn danger">清空日志</button>
            </div>
        </div>
        <div class="st-is-settings-section">
            <h4>正在播放</h4>
            <div id="st-is-playing-list-container" class="st-is-playing-list-container">
                <!-- Playing items will be dynamically inserted here -->
            </div>
        </div>
        <div class="st-is-field-col">
            <label for="st-is-log-textarea">日志输出</label>
            <textarea id="st-is-log-textarea" class="st-is-textarea" rows="15" readonly style="font-family: monospace; font-size: 12px;"></textarea>
        </div>
    </div>
</div>
