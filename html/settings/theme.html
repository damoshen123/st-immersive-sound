<div class="st-is-tab-content" id="st-is-tab-theme">
    <div class="st-is-settings-section">
        <h3>主题设置</h3>
        <div class="st-is-field">
            <label for="st-is-theme-id">主题预设</label>
            <div class="st-is-profile-controls">
                <select id="st-is-theme-id" class="st-is-select"></select>
                <button class="st-is-icon-btn" id="st-is-theme-save-style" title="保存"><i class="fa-solid fa-save"></i></button>
                <button class="st-is-icon-btn" id="st-is-theme-export-current" title="导出当前"><i class="fa-solid fa-upload"></i></button>
                <button class="st-is-icon-btn" id="st-is-theme-export-all" title="导出全部"><i class="fa-solid fa-file-export"></i></button>
                <button class="st-is-icon-btn" id="st-is-theme-import" title="导入"><i class="fa-solid fa-download"></i></button>
                <button class="st-is-icon-btn danger" id="st-is-theme-delete-style" title="删除"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
        <div id="st-is-theme-color-pickers" class="st-is-grid">
            <!-- Color pickers will be dynamically inserted here -->
        </div>
    </div>
    <div class="st-is-settings-section">
        <h3>歌词播放器主题</h3>
        <div class="st-is-field">
            <label for="st-is-lyrics-theme-id">播放器皮肤</label>
            <select id="st-is-lyrics-theme-id" class="st-is-select"></select>
        </div>
    </div>
</div>
